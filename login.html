<!DOCTYPE html>
<html>
<head>
  <title>TravelX Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">

  <!-- LEFT IMAGE -->
  <div class="login-left">
    <h1>🌍 TravelX</h1>
    <p>Explore the world like never before ✈️</p>
  </div>

  <!-- RIGHT FORM -->
  <div class="login-right">
    <h2>Login</h2>

    <form id="loginForm">
      <input id="username" placeholder="Username" required>
      <input id="password" type="password" placeholder="Password" required>

      <!-- ✅ FORGOT PASSWORD (CORRECT PLACE) -->
      <p class="forgot-link" onclick="openForgot()">Forgot Password?</p>

      <select id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <button>Login</button>
    </form>

    <p>New user? <a href="register.html">Register</a></p>
  </div>

</div>

<!-- ✅ MODAL (OUTSIDE CONTAINER) -->
<div id="forgotModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeForgot()">&times;</span>

    <h2>Reset Password 🔑</h2>

    <input id="fpUser" placeholder="Enter Username">
    <input id="fpNewPass" placeholder="New Password">

    <button onclick="resetPassword()">Reset</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
