<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>🛠 Admin Panel</h2>

  <button onclick="loadAdmin()">📦 Manage Places</button>
  <button onclick="loadAnalytics()">📊 Analytics</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<h2>📊 Dashboard</h2>

<div class="stats">
  <div class="card">Total Places: <span id="totalPlaces">0</span></div>
  <div class="card">Total Trips: <span id="totalTrips">0</span></div>
  <div class="card">Total Users: <span id="totalUsers">0</span></div>
</div>

<h2>Add Place</h2>

<form id="destForm" class="card">
<input id="destName" placeholder="Place Name" required>
<input id="image" placeholder="Image URL">
<input id="cost" placeholder="Cost">
<input id="desc" placeholder="Description">
<input id="rating" placeholder="Rating">
<input id="map" placeholder="Google Map Embed">
<button>Add</button>
</form>

<h2>All Destinations</h2>
<div id="destList" class="grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
